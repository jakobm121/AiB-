name: Tennis Totals Premium Aggregator

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-premium-aggregator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout AiB repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run premium aggregator
        run: python tennis_totals_premium/tennis_totals_premium_aggregator.py

      - name: Commit premium aggregator outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tennis_totals_premium_picks.json
          git add data/tennis_totals_premium_report.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update tennis totals premium aggregator"
            git push
          fi
