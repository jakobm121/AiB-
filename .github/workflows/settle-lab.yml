name: Settle AI77 Lab Results

on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *'

permissions:
  contents: write

jobs:
  settle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure JSON exists
        run: |
          if [ ! -f lab_results.json ]; then echo "[]" > lab_results.json; fi
          if [ ! -f lab_stats.json ]; then echo "{}" > lab_stats.json; fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Settle finished lab picks
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python ai77_lab_settle.py

      - name: Run lab stats
        run: python ai77_lab_stats.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add lab_results.json lab_stats.json
          git commit -m "Settle AI77 Lab results" || echo "No changes to commit"
          git push
