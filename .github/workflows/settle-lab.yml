name: AI77 Lab Settle Hourly

on:
  schedule:
  - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  settle-lab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run settle
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python ai77_lab_settle.py

      - name: Rebuild stats
        run: python ai77_lab_stats.py

      - name: Commit updated settle and stats files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lab_results.json lab_stats.json
          git diff --cached --quiet || git commit -m "Update AI77 lab settle and stats"
          git push
