name: AI77 Hockey Lab Settle

on:
  schedule:
    # 1x dnevno, da ne kuri preveč API klicev
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  settle-hockey-lab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run hockey settle
        env:
          HOCKEY_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python ai77_hockey_settle.py

      - name: Rebuild hockey stats
        run: python ai77_hockey_stats.py

      - name: Commit settled hockey files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hockey/hockey_results.json hockey/hockey_stats.json
          git diff --cached --quiet || git commit -m "Settle AI77 hockey results"
          git push
