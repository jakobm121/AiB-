name: Aggregate Totals

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  aggregate-totals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout AiB
        uses: actions/checkout@v4
        with:
          path: AiB

      - name: Checkout Ai
        uses: actions/checkout@v4
        with:
          repository: jakobm121/Ai
          path: Ai

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show files before
        run: |
          echo "=== root ==="
          ls -la

          echo "=== AiB ==="
          ls -la AiB

          echo "=== AiB/scripts ==="
          ls -la AiB/scripts || true

          echo "=== Ai/data ==="
          ls -la Ai/data || true

          echo "=== AiB/public/data before ==="
          ls -la AiB/public/data || true

      - name: Run totals aggregator
        run: |
          cd AiB
          AI_REPO_DIR=../Ai python scripts/aggregate_totals.py

      - name: Verify output
        run: |
          echo "=== AiB/public/data after ==="
          ls -la AiB/public/data

          if [ ! -f AiB/public/data/totals_predictions.json ]; then
            echo "ERROR: totals_predictions.json was not created."
            exit 1
          fi

          if [ ! -f AiB/public/data/totals_results.json ]; then
            echo "ERROR: totals_results.json was not created."
            exit 1
          fi

          if [ ! -f AiB/public/data/totals_stats.json ]; then
            echo "ERROR: totals_stats.json was not created."
            exit 1
          fi

          echo "All totals files created."
          wc -c AiB/public/data/totals_predictions.json
          wc -c AiB/public/data/totals_results.json
          wc -c AiB/public/data/totals_stats.json

      - name: Commit updated totals data
        run: |
          cd AiB

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/data/totals_predictions.json public/data/totals_results.json public/data/totals_stats.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update totals public data"
          git push
