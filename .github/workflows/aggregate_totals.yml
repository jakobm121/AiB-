name: Update Totals Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-totals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout AiB repo
        uses: actions/checkout@v4
        with:
          path: AiB

      - name: Checkout Ai repo
        uses: actions/checkout@v4
        with:
          repository: jakobm121/Ai
          path: Ai

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug repo files
        run: |
          echo "=== ROOT ==="
          ls -la

          echo "=== AiB ==="
          find AiB -maxdepth 3 -type f | sort

          echo "=== Ai ==="
          find Ai -maxdepth 4 -type f | sort

      - name: Prepare output folder
        run: |
          mkdir -p AiB/public/data

      - name: Run totals aggregator
        run: |
          python AiB/scripts/aggregate_totals.py \
            --predictions Ai/data/tennis_totals_predictions.json \
            --results Ai/data/tennis_totals_results.json \
            --output AiB/public/data/totals.json

      - name: Verify totals output
        run: |
          echo "=== AiB/public/data ==="
          ls -la AiB/public/data || true

          if [ ! -f AiB/public/data/totals.json ]; then
            echo "ERROR: totals.json was not created."
            echo "Check paths:"
            echo "- AiB/scripts/aggregate_totals.py"
            echo "- Ai/data/tennis_totals_predictions.json"
            echo "- Ai/data/tennis_totals_results.json"
            exit 1
          fi

          echo "totals.json created successfully"
          head -c 1000 AiB/public/data/totals.json

      - name: Commit updated totals
        run: |
          cd AiB

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/data/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update totals data"
            git push
          fi
