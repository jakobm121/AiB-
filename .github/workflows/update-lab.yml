name: Update AI77 Lab Model

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure JSON exists
        run: |
          if [ ! -f lab_predictions.json ]; then echo "{}" > lab_predictions.json; fi
          if [ ! -f lab_results.json ]; then echo "[]" > lab_results.json; fi
          if [ ! -f lab_stats.json ]; then echo "{}" > lab_stats.json; fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Run lab model
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python ai77_lab.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add lab_predictions.json lab_results.json
          git commit -m "Update AI77 Lab model" || echo "No changes to commit"
          git push
