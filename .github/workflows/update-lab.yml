name: AI77 Lab Hourly

on:
  schedule:
  - cron: "0 6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-lab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run AI77 lab model
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python ai77_lab.py

      - name: Commit updated lab files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lab_predictions.json lab_results.json
          git diff --cached --quiet || git commit -m "Update AI77 lab predictions"
          git push
