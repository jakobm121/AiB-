<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tennis Totals Premium</title>

  <style>
    :root {
      --bg: #07111f;
      --panel: #0d1b2e;
      --panel2: #10243c;
      --text: #eaf2ff;
      --muted: #8fa6c3;
      --line: rgba(255,255,255,.11);
      --good: #23d18b;
      --bad: #ff5c7a;
      --warn: #ffd166;
      --blue: #5ea1ff;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(94,161,255,.20), transparent 35%),
        radial-gradient(circle at top right, rgba(35,209,139,.12), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    .wrap {
      width: min(1500px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 50px;
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 15px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,.04);
      white-space: nowrap;
      font-size: 13px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--good);
      box-shadow: 0 0 20px var(--good);
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .cards {
      grid-template-columns: repeat(6, minmax(0, 1fr));
      margin-bottom: 14px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.025));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 17px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .card .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .09em;
      margin-bottom: 8px;
    }

    .card .value {
      font-size: 27px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .card .small {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .warn { color: var(--warn); }
    .blue { color: var(--blue); }

    .section {
      background: rgba(13,27,46,.76);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-top: 14px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.035);
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    input, select, button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.055);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      outline: none;
    }

    input {
      min-width: 250px;
    }

    select {
      cursor: pointer;
    }

    button {
      cursor: pointer;
      font-weight: 700;
    }

    button:hover, input:focus, select:focus {
      border-color: rgba(94,161,255,.55);
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: 11px;
      background: rgba(255,255,255,.025);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td {
      background: rgba(94,161,255,.045);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-weight: 800;
      font-size: 12px;
    }

    .badge.win {
      color: var(--good);
      background: rgba(35,209,139,.10);
      border-color: rgba(35,209,139,.25);
    }

    .badge.loss {
      color: var(--bad);
      background: rgba(255,92,122,.10);
      border-color: rgba(255,92,122,.25);
    }

    .badge.open {
      color: var(--warn);
      background: rgba(255,209,102,.10);
      border-color: rgba(255,209,102,.25);
    }

    .badge.premium {
      color: var(--blue);
      background: rgba(94,161,255,.10);
      border-color: rgba(94,161,255,.25);
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .tier-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      padding: 16px;
    }

    .tier-card {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 15px;
    }

    .tier-name {
      font-weight: 900;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .tier-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      padding: 6px 0;
      border-bottom: 1px dashed rgba(255,255,255,.10);
      font-size: 13px;
    }

    .tier-row:last-child {
      border-bottom: 0;
    }

    .tier-row b {
      color: var(--text);
    }

    .error {
      padding: 22px;
      background: rgba(255,92,122,.10);
      border: 1px solid rgba(255,92,122,.30);
      border-radius: var(--radius);
      color: #ffd7df;
      line-height: 1.55;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
    }

    .footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 1100px) {
      .cards {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .two-col {
        grid-template-columns: 1fr;
      }

      .tier-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      .top {
        flex-direction: column;
      }

      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .tier-grid {
        grid-template-columns: 1fr;
      }

      input {
        min-width: 100%;
      }

      .section-head {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>Tennis Totals Premium</h1>
        <div class="subtitle">
          Ločena premium stran za agregator, settle, statistiko, odprte picke in rezultate.
        </div>
      </div>

      <div class="pill">
        <span class="dot"></span>
        <span id="lastUpdated">Loading...</span>
      </div>
    </div>

    <div id="app">
      <div class="empty">Nalagam podatke...</div>
    </div>

    <div class="footer">
      Data source: <b>/data/tennis_totals_premium_report.json</b>
    </div>
  </main>

  <script>
    const DATA_URL = "/data/tennis_totals_premium_report.json";

    let REPORT = null;
    let ALL_ROWS = [];

    function n(value, fallback = 0) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function fmt(value, digits = 2) {
      return n(value).toFixed(digits);
    }

    function fmtPct(value) {
      return `${fmt(value, 2)}%`;
    }

    function fmtUnits(value) {
      const number = n(value);
      return `${number >= 0 ? "+" : ""}${number.toFixed(2)}u`;
    }

    function safe(value, fallback = "-") {
      if (value === null || value === undefined || value === "") return fallback;
      return String(value);
    }

    function pickResult(pick) {
      return safe(pick?.result, "").trim().toLowerCase();
    }

    function resultBadge(result) {
      const r = safe(result, "").toLowerCase();

      if (r === "win") return `<span class="badge win">WIN</span>`;
      if (r === "loss") return `<span class="badge loss">LOSS</span>`;

      return `<span class="badge open">${r ? r.toUpperCase() : "OPEN"}</span>`;
    }

    function profitForRow(row) {
      const pick = row.pick || {};
      const result = pickResult(pick);
      const odds = n(pick.odds);
      const stake = n(row.stake);

      if (result === "win") return stake * (odds - 1);
      if (result === "loss") return -stake;

      return 0;
    }

    function rowDate(row) {
      const p = row.pick || {};
      return `${safe(p.date, "")} ${safe(p.time, "")}`.trim();
    }

    function rowSortValue(row) {
      const p = row.pick || {};
      return `${safe(p.date, "")} ${safe(p.time, "")} ${safe(p.match, "")}`;
    }

    function classProfit(value) {
      if (n(value) > 0) return "good";
      if (n(value) < 0) return "bad";
      return "";
    }

    function getSummary() {
      return REPORT?.summary || {};
    }

    function buildCards() {
      const s = getSummary();

      return `
        <section class="grid cards">
          <div class="card">
            <div class="label">Settled picks</div>
            <div class="value">${safe(s.picks, 0)}</div>
            <div class="small">Known total: ${safe(REPORT.known_total, 0)}</div>
          </div>

          <div class="card">
            <div class="label">Win rate</div>
            <div class="value ${n(s.win_rate) >= 60 ? "good" : ""}">${fmtPct(s.win_rate)}</div>
            <div class="small">${safe(s.wins, 0)}W / ${safe(s.losses, 0)}L</div>
          </div>

          <div class="card">
            <div class="label">Profit</div>
            <div class="value ${classProfit(s.profit)}">${fmtUnits(s.profit)}</div>
            <div class="small">Staked: ${fmt(s.staked)}u</div>
          </div>

          <div class="card">
            <div class="label">ROI</div>
            <div class="value ${n(s.roi) > 0 ? "good" : "bad"}">${fmtPct(s.roi)}</div>
            <div class="small">Avg odds: ${fmt(s.avg_odds, 3)}</div>
          </div>

          <div class="card">
            <div class="label">Max drawdown</div>
            <div class="value warn">${fmt(s.max_drawdown_units)}u</div>
            <div class="small">Risk control</div>
          </div>

          <div class="card">
            <div class="label">Open picks</div>
            <div class="value blue">${safe(REPORT.open_total, 0)}</div>
            <div class="small">New settled: ${safe(REPORT.newly_settled_count, 0)}</div>
          </div>
        </section>
      `;
    }

    function buildTierStats() {
      const byTier = getSummary().by_tier || {};
      const tiers = Object.keys(byTier);

      if (!tiers.length) {
        return `
          <section class="section">
            <div class="section-head">
              <div class="section-title">Stats by tier</div>
            </div>
            <div class="empty">Ni tier statistike.</div>
          </section>
        `;
      }

      return `
        <section class="section">
          <div class="section-head">
            <div class="section-title">Stats by tier</div>
          </div>

          <div class="tier-grid">
            ${tiers.map(tier => {
              const x = byTier[tier];

              return `
                <div class="tier-card">
                  <div class="tier-name">${safe(tier)}</div>

                  <div class="tier-row"><span>Picks</span><b>${safe(x.picks, 0)}</b></div>
                  <div class="tier-row"><span>Record</span><b>${safe(x.wins, 0)}W / ${safe(x.losses, 0)}L</b></div>
                  <div class="tier-row"><span>Win rate</span><b class="${n(x.win_rate) >= 60 ? "good" : ""}">${fmtPct(x.win_rate)}</b></div>
                  <div class="tier-row"><span>Profit</span><b class="${classProfit(x.profit)}">${fmtUnits(x.profit)}</b></div>
                  <div class="tier-row"><span>ROI</span><b class="${n(x.roi) > 0 ? "good" : "bad"}">${fmtPct(x.roi)}</b></div>
                  <div class="tier-row"><span>Avg odds</span><b>${fmt(x.avg_odds, 3)}</b></div>
                </div>
              `;
            }).join("")}
          </div>
        </section>
      `;
    }

    function normalizeRows() {
      const open = (REPORT.open_picks || []).map(x => ({ ...x, _bucket: "open" }));
      const settled = (REPORT.settled_picks || []).map(x => ({ ...x, _bucket: "settled" }));
      const newly = (REPORT.newly_settled || []).map(x => ({ ...x, _bucket: "newly" }));

      const byId = new Map();

      [...settled, ...open, ...newly].forEach(row => {
        const id = row.id || JSON.stringify([
          row.pick?.fixture_id,
          row.pick?.event_key,
          row.pick?.match,
          row.pick?.side,
          row.pick?.line,
          row.pick?.date,
          row.pick?.time
        ]);

        if (!byId.has(id)) {
          byId.set(id, row);
        } else if (row._bucket === "newly") {
          byId.set(id, row);
        }
      });

      ALL_ROWS = Array.from(byId.values()).sort((a, b) => {
        return rowSortValue(b).localeCompare(rowSortValue(a));
      });
    }

    function buildTableSection(title, tableId, rows, defaultLimit = 100) {
      return `
        <section class="section">
          <div class="section-head">
            <div class="section-title">${title}</div>

            <div class="controls">
              <input id="${tableId}_search" placeholder="Search match, player, side..." />
              <select id="${tableId}_result">
                <option value="all">All results</option>
                <option value="open">Open</option>
                <option value="win">Win</option>
                <option value="loss">Loss</option>
              </select>
              <select id="${tableId}_tier">
                <option value="all">All tiers</option>
              </select>
              <select id="${tableId}_limit">
                <option value="25">25 rows</option>
                <option value="50">50 rows</option>
                <option value="100" selected>100 rows</option>
                <option value="250">250 rows</option>
                <option value="99999">All rows</option>
              </select>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Match</th>
                  <th>Pick</th>
                  <th>Line</th>
                  <th>Odds</th>
                  <th>Stake</th>
                  <th>Tier</th>
                  <th>Result</th>
                  <th>Profit</th>
                  <th>Confidence</th>
                  <th>Edge</th>
                  <th>Books</th>
                </tr>
              </thead>
              <tbody id="${tableId}_body"></tbody>
            </table>
          </div>
        </section>
      `;
    }

    function populateTierSelect(tableId, rows) {
      const select = document.getElementById(`${tableId}_tier`);
      if (!select) return;

      const tiers = Array.from(new Set(rows.map(r => safe(r.tier, "Unknown")))).sort();

      tiers.forEach(tier => {
        const opt = document.createElement("option");
        opt.value = tier;
        opt.textContent = tier;
        select.appendChild(opt);
      });
    }

    function renderRows(tableId, baseRows) {
      const body = document.getElementById(`${tableId}_body`);
      if (!body) return;

      const search = document.getElementById(`${tableId}_search`)?.value?.trim().toLowerCase() || "";
      const resultFilter = document.getElementById(`${tableId}_result`)?.value || "all";
      const tierFilter = document.getElementById(`${tableId}_tier`)?.value || "all";
      const limit = Number(document.getElementById(`${tableId}_limit`)?.value || 100);

      let rows = [...baseRows];

      if (search) {
        rows = rows.filter(row => {
          const p = row.pick || {};
          const haystack = [
            p.match,
            p.player_a,
            p.player_b,
            p.side,
            p.tour_level,
            p.tournament,
            row.tier,
            row.id
          ].map(safe).join(" ").toLowerCase();

          return haystack.includes(search);
        });
      }

      if (resultFilter !== "all") {
        rows = rows.filter(row => {
          const r = pickResult(row.pick || {});
          if (resultFilter === "open") return r !== "win" && r !== "loss";
          return r === resultFilter;
        });
      }

      if (tierFilter !== "all") {
        rows = rows.filter(row => safe(row.tier, "Unknown") === tierFilter);
      }

      rows = rows.slice(0, limit);

      if (!rows.length) {
        body.innerHTML = `
          <tr>
            <td colspan="12" class="empty">Ni podatkov za izbrane filtre.</td>
          </tr>
        `;
        return;
      }

      body.innerHTML = rows.map(row => {
        const p = row.pick || {};
        const result = pickResult(p);
        const profit = profitForRow(row);

        return `
          <tr>
            <td>${safe(p.date)} ${safe(p.time, "")}</td>
            <td>${safe(p.match)}</td>
            <td><b>${safe(p.side).toUpperCase()}</b></td>
            <td>${safe(p.line)}</td>
            <td>${fmt(p.odds, 3)}</td>
            <td>${fmt(row.stake, 2)}u</td>
            <td><span class="badge premium">${safe(row.tier, "Premium")}</span></td>
            <td>${resultBadge(result)}</td>
            <td class="${classProfit(profit)}"><b>${fmtUnits(profit)}</b></td>
            <td>${fmt(p.confidence, 2)}</td>
            <td>${fmt(p.edge, 4)}</td>
            <td>${safe(p.bookmakers_used)}</td>
          </tr>
        `;
      }).join("");
    }

    function attachTableEvents(tableId, rows) {
      ["search", "result", "tier", "limit"].forEach(part => {
        const el = document.getElementById(`${tableId}_${part}`);
        if (!el) return;

        el.addEventListener("input", () => renderRows(tableId, rows));
        el.addEventListener("change", () => renderRows(tableId, rows));
      });

      populateTierSelect(tableId, rows);
      renderRows(tableId, rows);
    }

    function buildPage() {
      normalizeRows();

      const openRows = ALL_ROWS.filter(row => {
        const r = pickResult(row.pick || {});
        return r !== "win" && r !== "loss";
      });

      const settledRows = ALL_ROWS.filter(row => {
        const r = pickResult(row.pick || {});
        return r === "win" || r === "loss";
      });

      const newlyRows = REPORT.newly_settled || [];

      document.getElementById("lastUpdated").textContent =
        REPORT.settled_at_utc
          ? `Updated: ${new Date(REPORT.settled_at_utc).toLocaleString()}`
          : "Updated: unknown";

      document.getElementById("app").innerHTML = `
        ${buildCards()}
        ${buildTierStats()}

        <div class="two-col">
          ${buildTableSection("Open picks", "openTable", openRows, 100)}
          ${buildTableSection("Newly settled", "newTable", newlyRows, 100)}
        </div>

        ${buildTableSection("All picks / Results history", "allTable", ALL_ROWS, 100)}
      `;

      attachTableEvents("openTable", openRows);
      attachTableEvents("newTable", newlyRows);
      attachTableEvents("allTable", ALL_ROWS);
    }

    async function load() {
      try {
        const res = await fetch(`${DATA_URL}?v=${Date.now()}`, { cache: "no-store" });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status} while loading ${DATA_URL}`);
        }

        REPORT = await res.json();
        buildPage();
      } catch (err) {
        document.getElementById("lastUpdated").textContent = "Data error";

        document.getElementById("app").innerHTML = `
          <div class="error">
            <b>Ne morem naložiti premium reporta.</b><br><br>
            Preveri, da obstaja datoteka:<br>
            <code>${DATA_URL}</code><br><br>
            In da sta GitHub Actions za agregator/settle že ustvarila:<br>
            <code>data/tennis_totals_premium_report.json</code><br><br>
            Error: ${safe(err.message)}
          </div>
        `;
      }
    }

    load();
  </script>
</body>
</html>
