# tennis_totals_premium/config.yml

source:
  # Ai repo results file
  results_url: "https://raw.githubusercontent.com/jakobm121/Ai/main/data/tennis_totals_results.json"

output:
  picks_file: "data/tennis_totals_premium_picks.json"
  settled_file: "data/tennis_totals_premium_settled.json"
  report_file: "data/tennis_totals_premium_report.json"

strategy:
  name: "tennis_totals_premium"

  # Glavni filter, ki sva ga validirala:
  # Premium:
  # side == under
  # confidence >= 82
  # bookmakers_used NOT between 6 and 7.999
  # stake_label == Strong
  premium:
    enabled: true
    stake: 1.0
    side: "under"
    min_confidence: 82
    stake_label: "Strong"
    exclude_bookmakers_min: 6
    exclude_bookmakers_max: 8

  # Za zdaj OFF, ker test_30 ni bil dober.
  # Lahko ga kasneje prižgeš na true.
  volume_b:
    enabled: false
    stake: 0.25
    line: 20.5
    min_confidence: 82
    excluded_stake_label: "Top Rated"

dedupe:
  enabled: true
